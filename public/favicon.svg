<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#BFFFFF"/>
      <stop offset="55%" stop-color="#74F7FF"/>
      <stop offset="100%" stop-color="#19D9FF"/>
    </radialGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Head -->
  <circle cx="64" cy="68" r="40" fill="#17223B"/>

  <!-- Ears -->
  <path d="M34 45 L46 16 L57 42 Z"
        fill="#17223B"/>
  <path d="M94 45 L82 16 L71 42 Z"
        fill="#17223B"/>

  <!-- Ear glow -->
  <path d="M42 34 L46 23 L51 36"
        stroke="#4AF6FF"
        stroke-width="2"
        fill="none"
        stroke-linecap="round"/>

  <path d="M86 34 L82 23 L77 36"
        stroke="#4AF6FF"
        stroke-width="2"
        fill="none"
        stroke-linecap="round"/>

  <!-- Eyes -->
  <g filter="url(#glow)">
    <circle cx="49" cy="63" r="11" fill="url(#eyeGlow)"/>
    <circle cx="79" cy="63" r="11" fill="url(#eyeGlow)"/>
  </g>

  <!-- Pupils -->
  <circle cx="49" cy="64" r="4" fill="#17384A"/>
  <circle cx="79" cy="64" r="4" fill="#17384A"/>

  <!-- Eye highlights -->
  <circle cx="46" cy="60" r="2.6" fill="white"/>
  <circle cx="76" cy="60" r="2.6" fill="white"/>

  <circle cx="52" cy="67" r="1.2" fill="#DFFFFF"/>
  <circle cx="82" cy="67" r="1.2" fill="#DFFFFF"/>

  <!-- Nose -->
  <path d="M61 79 L67 79 L64 83 Z"
        fill="#FF8ACF"/>

  <!-- Smile -->
  <path d="M58 87
           Q64 92
           70 87"
        stroke="#AEEFFF"
        stroke-width="2"
        fill="none"
        stroke-linecap="round"/>

  <!-- Tiny whiskers -->
  <path d="M35 80 L49 79"
        stroke="#4AF6FF"
        stroke-width="1.6"
        opacity=".35"/>

  <path d="M79 79 L93 80"
        stroke="#4AF6FF"
        stroke-width="1.6"
        opacity=".35"/>

  <!-- Robotic forehead mark -->
  <circle cx="64" cy="48"
          r="3"
          fill="#4AF6FF"
          opacity=".75"/>

  <!-- Tiny floating star -->
  <path d="M100 35
           l2 5
           l5 2
           l-5 2
           l-2 5
           l-2-5
           l-5-2
           l5-2z"
        fill="#6DF8FF"
        opacity=".8"/>
</svg>